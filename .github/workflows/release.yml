name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: nodewipe-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: nodewipe-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: nodewipe-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: nodewipe-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --package nodewipe-cli --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/nodewipe ${{ matrix.asset }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\nodewipe.exe ${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-gui:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev build-essential

      - name: Install GUI npm deps
        working-directory: gui
        run: npm install

      - name: Build GUI bundle
        working-directory: gui
        env:
          # linuxdeploy (used to build the AppImage) is itself an AppImage,
          # which needs FUSE to run. CI runners commonly lack it; this env
          # var makes it extract-and-run instead of mounting via FUSE.
          APPIMAGE_EXTRACT_AND_RUN: 1
          # linuxdeploy's bundled `strip` predates newer binutils/glibc ELF
          # section types (e.g. .relr.dyn), causing spurious strip failures
          # on newer toolchains. Skipping strip only affects binary size,
          # not functionality.
          NO_STRIP: true
        run: npm run build

      - name: Upload GUI bundle
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gui/src-tauri/target/release/bundle/**/*.AppImage
            gui/src-tauri/target/release/bundle/**/*.dmg
            gui/src-tauri/target/release/bundle/**/*.msi
            gui/src-tauri/target/release/bundle/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
