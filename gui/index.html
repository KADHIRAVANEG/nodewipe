<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>nodewipe</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>nodewipe</h1>
    </div>
    <div class="root-picker">
      <input id="search-input" type="text" placeholder="Filter by path..." />
      <input id="root-input" type="text" placeholder="/home/you" />
      <button id="scan-btn">Scan</button>
    </div>
  </header>

  <div class="toolbar">
    <div id="summary" class="summary">Enter a folder and click Scan.</div>
    <div class="view-toggle">
      <button id="view-flat" class="toggle-btn active">Flat</button>
      <button id="view-grouped" class="toggle-btn">Grouped</button>
    </div>
  </div>

  <div id="type-chips" class="type-chips"></div>

  <main>
    <div id="spinner" class="spinner-overlay hidden">
      <div class="spinner"></div>
      <span>Scanning...</span>
    </div>

    <table id="results">
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="select-all" /></th>
          <th class="sortable" data-sort="size">Size <span class="sort-arrow"></span></th>
          <th class="sortable" data-sort="pm">Type <span class="sort-arrow"></span></th>
          <th class="sortable" data-sort="path">Path <span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>

    <div id="empty-state" class="empty-state hidden">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="40" height="40">
        <path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>No disposable artifacts found here.</p>
    </div>
  </main>

  <footer>
    <button id="trash-btn" class="btn-safe" disabled>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
      Move to Trash
    </button>
    <button id="archive-btn" class="btn-neutral" disabled>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8H3v13h18V8zM1 3h22v5H1zM10 12h4"/></svg>
      Archive then Delete
    </button>
    <button id="permanent-btn" class="btn-danger" disabled>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14M10 11v6M14 11v6"/></svg>
      Delete Permanently
    </button>
    <span id="freed-total" class="freed-total"></span>
  </footer>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="modal-title">Confirm delete</h2>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-neutral">Cancel</button>
        <button id="modal-confirm" class="btn-danger">Delete permanently</button>
      </div>
    </div>
  </div>

  <div id="toast-stack" class="toast-stack"></div>

  <script src="src/main.js"></script>
</body>
</html>
